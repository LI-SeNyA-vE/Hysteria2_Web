name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
            cc: gcc
          - goarch: arm64
            runner: ubuntu-24.04-arm
            cc: gcc

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build panel-${{ matrix.goarch }}.zip
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          go build -trimpath -ldflags="-s -w" -o panel ./cmd/panel/
          zip "panel-${{ matrix.goarch }}.zip" panel

      - uses: actions/upload-artifact@v4
        with:
          name: panel-${{ matrix.goarch }}
          path: panel-${{ matrix.goarch }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/panel-amd64.zip
            dist/panel-arm64.zip
          generate_release_notes: true
